<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TArena - Task Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15171a;
      --panel: #20242a;
      --panel-2: #272c33;
      --text: #eef1f5;
      --muted: #9ca7b4;
      --accent: #5dd39e;
      --line: #363d46;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0;
    }

    header {
      display: flex;
      gap: 16px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      min-width: 120px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      text-align: center;
      font-weight: 700;
    }

    .task-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 56px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .task input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .task-title {
      font-size: 17px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .task-state {
      min-width: 76px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      text-transform: uppercase;
    }

    .task.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task.done .task-state {
      background: rgba(93, 211, 158, 0.15);
      color: var(--accent);
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 20px;
    }

    input[type="text"] {
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
    }

    button {
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #0c1511;
      font-weight: 700;
      cursor: pointer;
    }

    .reset {
      margin-top: 14px;
      background: transparent;
      color: var(--danger);
      padding: 0;
      font-size: 13px;
    }

    @media (max-width: 560px) {
      header,
      form {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .status {
        width: 100%;
      }

      .task {
        grid-template-columns: 28px 1fr;
      }

      .task-state {
        grid-column: 2;
        justify-self: start;
      }

      button {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>TArena - Task Board</h1>
        <div class="meta">Zaznaczenie checkboxa automatycznie zapisuje status.</div>
      </div>
      <div id="status" class="status" aria-live="polite">0 / 0 Done</div>
    </header>

    <ul id="taskList" class="task-list"></ul>

    <form id="addTaskForm" autocomplete="off">
      <input id="newTaskTitle" type="text" placeholder="Dodaj nowe zadanie">
      <button type="submit">Dodaj</button>
    </form>

    <button id="resetTasks" class="reset" type="button">Przywroc liste startowa</button>
  </main>

  <script src="./task-board.js"></script>
</body>
</html>
